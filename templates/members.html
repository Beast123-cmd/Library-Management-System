{% extends "base.html" %}
{% block content %}
<h2>Members</h2>
<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
        </tr>
    </thead>
    <tbody>
        {% for member in members %}
        <tr>
            <td>{{ member.member_id }}</td>
            <td>{{ member.name }}</td>
            <td>{{ member.email }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
