{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto; animation: fadeInUp 0.5s ease-out;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="margin: 0; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Edit Book</h2>
        <a href="{{ url_for('books') }}" class="btn btn-warning btn-sm">Cancel</a>
    </div>

    <form method="post">
        <div class="form-group">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" class="form-control" value="{{ book.title }}" required>
        </div>
        
        <div class="form-group">
            <label for="author">Author:</label>
            <input type="text" id="author" name="author" class="form-control" value="{{ book.author }}" required>
        </div>
        
        <div class="form-group">
            <label for="publish_year">Publish Year:</label>
            <input type="number" id="publish_year" name="publish_year" class="form-control" value="{{ book.publish_year }}" min="0" max="2100">
        </div>
        
        <div class="form-group">
            <label for="total_copies">Total Copies:</label>
            <input type="number" id="total_copies" name="total_copies" class="form-control" value="{{ book.total_copies }}" min="1" required>
        </div>
        
        <div style="margin-top: 32px;">
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; font-size: 16px;">
                <span style="font-size: 1.2rem; margin-right: 8px;">💾</span> Save Changes
            </button>
        </div>
    </form>
</div>
{% endblock %}
