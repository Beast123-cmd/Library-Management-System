{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
  <h2 class="mb-3">Edit Book</h2>
  <form method="post" class="card p-4 shadow-sm">
    <div class="mb-3">
      <label class="form-label">Title</label>
      <input type="text" name="title" class="form-control" value="{{ book.title }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Author</label>
      <input type="text" name="author" class="form-control" value="{{ book.author }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Publish Year</label>
      <input type="number" name="publish_year" class="form-control" value="{{ book.publish_year }}" min="0" max="2100">
    </div>
    <div class="mb-3">
      <label class="form-label">Total Copies</label>
      <input type="number" name="total_copies" class="form-control" value="{{ book.total_copies }}" min="1" required>
    </div>
    <button class="btn btn-primary">Update</button>
  </form>
</div>
{% endblock %}
