{% extends "base.html" %}
{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">👤</div>
            <h2>Create Account</h2>
            <p>Join the library management system</p>
        </div>
        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="Choose a secure password" required>
            </div>
            <button type="submit" class="btn btn-success login-btn">Sign Up</button>
        </form>
        <div class="login-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}" class="btn-link">Sign In</a></p>
        </div>
    </div>
</div>
{% endblock %}
