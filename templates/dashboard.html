<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Admin Dashboard</h1>

        <!-- Row 1: Charts -->
        <div class="row">
            <div class="col-md-6 mb-4">
                <canvas id="pieChart" width="400" height="400"></canvas>
            </div>
            <div class="col-md-6 mb-4">
                <canvas id="barChart" width="400" height="400"></canvas>
            </div>
        </div>

        <!-- Row 2: Recent Activities -->
        <div class="row">
            <div class="col-md-12">
                <h3>Recent Activities</h3>
                <div id="recentActivities"></div>
            </div>
        </div>
    </div>

    <script>
        // ---- Convert Jinja variables to JS arrays safely ----
        const pieLabels = JSON.parse('{{ pie_labels|tojson|safe }}');
        const pieValues = JSON.parse('{{ pie_values|tojson|safe }}');
        const barLabels = JSON.parse('{{ bar_labels|tojson|safe }}');
        const barValues = JSON.parse('{{ bar_values|tojson|safe }}');
        const recentActivities = JSON.parse('{{ recent_activities|tojson|safe }}');

        // ---- Pie Chart: Book Status Distribution ----
        const pieCtx = document.getElementById('pieChart').getContext('2d');
        const pieChart = new Chart(pieCtx, {
            type: 'pie',
            data: {
                labels: pieLabels,
                datasets: [{
                    data: pieValues,
                    backgroundColor: [
                        'rgba(75, 192, 192, 0.6)',
                        'rgba(255, 99, 132, 0.6)',
                        'rgba(255, 206, 86, 0.6)',
                        'rgba(54, 162, 235, 0.6)',
                        'rgba(153, 102, 255, 0.6)'
                    ],
                    borderColor: [
                        'rgba(75, 192, 192, 1)',
                        'rgba(255, 99, 132, 1)',
                        'rgba(255, 206, 86, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(153, 102, 255, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'top' },
                    title: { display: true, text: 'Book Status Distribution' }
                }
            }
        });

        // ---- Bar Chart: Top 5 Issued Books ----
        const barCtx = document.getElementById('barChart').getContext('2d');
        const barChart = new Chart(barCtx, {
            type: 'bar',
            data: {
                labels: barLabels,
                datasets: [{
                    label: 'Times Issued',
                    data: barValues,
                    backgroundColor: 'rgba(54, 162, 235, 0.6)',
                    borderColor: 'rgba(54, 162, 235, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { display: false },
                    title: { display: true, text: 'Top 5 Issued Books' }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        // ---- Display Recent Activities ----
        const activitiesDiv = document.getElementById('recentActivities');
        if (activitiesDiv) {
            activitiesDiv.innerHTML = '';
            if (recentActivities.length === 0) {
                activitiesDiv.innerHTML = '<p>No recent activities.</p>';
            } else {
                const ul = document.createElement('ul');
                recentActivities.forEach(act => {
                    const li = document.createElement('li');
                    li.textContent = act;
                    ul.appendChild(li);
                });
                activitiesDiv.appendChild(ul);
            }
        }
    </script>
</body>
</html>
