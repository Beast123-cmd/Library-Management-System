{% extends "base.html" %}
{% block title %}Login - Library DBMS{% endblock %}
{% block page_title %}Welcome Back{% endblock %}
{% block content %}

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">📚</div>
            <h2>Library Management System</h2>
            <p>Sign in to access your account</p>
        </div>
        
        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-control" required placeholder="Enter your username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="Enter your password">
            </div>
            
            <button type="submit" class="btn btn-primary login-btn">
                <span>🔐</span> Sign In
            </button>
            
            <div class="login-footer">
                <p>Don't have an account? <a href="{{ url_for('signup') }}" class="btn-link">Create one here</a></p>
            </div>
        </form>
    </div>
</div>

{% endblock %}
