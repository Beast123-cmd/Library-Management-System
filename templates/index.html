{% extends "base.html" %}
{% block content %}
<div class="text-center mt-5">
  <h1>Welcome {{ username }}!</h1>
  {% if role == 'admin' %}
    <p>You are logged in as <strong>Admin</strong>.</p>
  {% else %}
    <p>You are logged in as <strong>Member</strong>.</p>
  {% endif %}
</div>
{% endblock %}
