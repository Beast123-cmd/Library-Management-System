{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 class="mb-0">Issue Book</h3>
                </div>
                <div class="card-body">
                    <div class="book-info mb-4">
                        <h4>{{ book.title }}</h4>
                        <p class="text-muted"><strong>Author:</strong> {{ book.author }}</p>
                        <p class="text-muted"><strong>Available Copies:</strong> {{ book.available_copies }}</p>
                    </div>

                    {% if book.available_copies > 0 %}
                    <form method="POST" action="{{ url_for('issue_book', book_id=book.book_id) }}">
                        <div class="form-group mb-3">
                            <label for="member_id" class="form-label">Select Member:</label>
                            <select name="member_id" id="member_id" class="form-control" required>
                                <option value="">Choose a member...</option>
                                {% for member in members %}
                                <option value="{{ member.member_id }}">{{ member.name }} (ID: {{ member.member_id }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="due_days" class="form-label">Loan Period (days):</label>
                            <select name="due_days" id="due_days" class="form-control">
                                <option value="7">7 days (default)</option>
                                <option value="14">14 days</option>
                                <option value="30">30 days</option>
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning">
                                <span>📖</span> Issue Book
                            </button>
                            <a href="{{ url_for('books') }}" class="btn btn-secondary">
                                <span>↩️</span> Back to Books
                            </a>
                        </div>
                    </form>
                    {% else %}
                    <div class="alert alert-danger">
                        <span>⚠️</span> Book not available for issue
                    </div>
                    <a href="{{ url_for('books') }}" class="btn btn-secondary">
                        <span>↩️</span> Back to Books
                    </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
