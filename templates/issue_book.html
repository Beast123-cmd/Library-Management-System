{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3>Issue Book</h3>
        <p><strong>Title:</strong> {{ book.title }}</p>
        <p><strong>Author:</strong> {{ book.author }}</p>
        <p><strong>Available Copies:</strong> {{ book.available_copies }}</p>

        {% if book.available_copies > 0 %}
        <form method="POST" action="{{ url_for('issue_book', book_id=book.book_id) }}">
            <button type="submit" class="btn btn-warning">Issue Book</button>
            <a href="{{ url_for('books') }}" class="btn btn-secondary">Back</a>
        </form>
        {% else %}
        <div class="alert alert-danger">Book not available for issue</div>
        <a href="{{ url_for('books') }}" class="btn btn-secondary">Back</a>
        {% endif %}
    </div>
</div>
{% endblock %}
