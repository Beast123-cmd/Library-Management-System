{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto; animation: fadeInUp 0.5s ease-out;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="margin: 0; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Issue Book</h2>
    </div>

    <div style="background: rgba(59, 130, 246, 0.05); padding: 16px; border-radius: 12px; margin-bottom: 24px; border: 1px solid rgba(59, 130, 246, 0.2);">
        <h3 style="margin: 0 0 8px 0; font-size: 1.25rem;">{{ book.title }}</h3>
        <p style="margin: 0 0 4px 0; opacity: 0.8;"><strong>Author:</strong> {{ book.author }}</p>
        <p style="margin: 0; opacity: 0.8;"><strong>Available Copies:</strong> 
            <span class="badge {% if book.available_copies > 0 %}bg-success{% else %}bg-danger{% endif %}">{{ book.available_copies }}</span>
        </p>
    </div>

    {% if book.available_copies > 0 %}
    <form method="POST" action="{{ url_for('issue_book', book_id=book.book_id) }}">
        <div class="form-group">
            <label for="member_id">Select Member:</label>
            <select name="member_id" id="member_id" class="form-control" required style="cursor: pointer;">
                <option value="">Choose a member...</option>
                {% for member in members %}
                <option value="{{ member.member_id }}">{{ member.name }} (ID: {{ member.member_id }})</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="due_days">Loan Period (days):</label>
            <select name="due_days" id="due_days" class="form-control" style="cursor: pointer;">
                <option value="7">7 days (default)</option>
                <option value="14">14 days</option>
                <option value="30">30 days</option>
            </select>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 32px;">
            <button type="submit" class="btn btn-warning" style="flex: 1; padding: 14px; font-size: 16px;">
                <span style="font-size: 1.2rem; margin-right: 8px;">📖</span> Confirm Issue
            </button>
            <a href="{{ url_for('books') }}" class="btn btn-secondary" style="background: var(--sidebar-bg); flex: 1; text-align: center; padding: 14px; font-size: 16px;">
                <span style="font-size: 1.2rem; margin-right: 8px;">↩️</span> Back
            </a>
        </div>
    </form>
    {% else %}
    <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid var(--btn-danger); color: var(--btn-danger); padding: 16px; border-radius: 12px; margin-bottom: 24px; text-align: center;">
        <span style="font-size: 1.5rem; display: block; margin-bottom: 8px;">⚠️</span>
        <strong>Book not available for issue</strong>
    </div>
    <a href="{{ url_for('books') }}" class="btn btn-secondary" style="background: var(--sidebar-bg); width: 100%; text-align: center; padding: 14px; font-size: 16px;">
        <span style="font-size: 1.2rem; margin-right: 8px;">↩️</span> Back to Library
    </a>
    {% endif %}
</div>
{% endblock %}
